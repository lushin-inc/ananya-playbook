<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Ananya — Sales Playbook</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<meta name="description" content="Working sessions and tools from Hypesonic's sales coaching with Dan Faber, Lushin.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@500;600;700;800&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#0F0F10;
    --ink-2:#141518;
    --paper:#FFFFFF;
    --paper-2:#FAFBFC;
    --line:#E7E8EA;
    --muted:#63676F;
    --muted-2:#9CA0A8;
    --orange:#FF4A1C;
    --orange-ink:#E23B0F;
    --orange-wash:#FFF3EE;
    --font-display:'Inter Tight',-apple-system,BlinkMacSystemFont,sans-serif;
    --font-body:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    --font-mono:'JetBrains Mono',ui-monospace,monospace;
    --wrap:880px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--paper);color:var(--ink);font-family:var(--font-body);font-size:16px;line-height:1.55;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:var(--wrap);margin:0 auto;padding:0 24px}

  /* nav */
  .nav{position:sticky;top:0;z-index:60;background:rgba(255,255,255,.85);backdrop-filter:saturate(160%) blur(12px);border-bottom:1px solid var(--line)}
  .nav-in{display:flex;align-items:center;justify-content:space-between;height:64px}
  .brand{display:flex;align-items:center;gap:9px;font-family:var(--font-display);font-weight:800;font-size:19px;letter-spacing:-.03em}
  .brand .dot{width:8px;height:8px;background:var(--orange);border-radius:2px;transform:rotate(45deg)}
  .brand-pair{display:flex;align-items:center;gap:12px}
  .brand-pair .x{color:var(--muted-2);font-size:15px;line-height:1}
  .brand-pair .x-dark{color:rgba(255,255,255,.4)}
  .brand-pair .lushin{height:25px;width:auto;display:block}
  .nav-links{display:flex;align-items:center;gap:26px}
  .nav-links a{font-family:var(--font-body);font-weight:600;font-size:14px;color:var(--muted);transition:color .14s ease}
  .nav-links a:hover{color:var(--orange)}

  /* hero */
  .hero{padding:72px 0 8px}
  .eyebrow{font-family:var(--font-mono);font-size:11.5px;letter-spacing:.18em;text-transform:uppercase;color:var(--orange);display:inline-flex;align-items:center;gap:8px;margin-bottom:14px}
  .eyebrow::before{content:"";width:14px;height:1px;background:var(--orange)}
  h1{font-family:var(--font-display);font-weight:800;font-size:clamp(30px,4.5vw,44px);letter-spacing:-.03em;line-height:1.04}
  .hero p{color:var(--muted);max-width:520px;margin-top:14px;font-size:16.5px}

  /* north star */
  .star{display:flex;gap:0;border:1px solid var(--line);border-radius:16px;margin-top:32px;overflow:hidden;background:#fff}
  .star .cell{flex:1;padding:20px 24px;border-right:1px solid var(--line)}
  .star .cell:last-child{border-right:0}
  .star .k{font-family:var(--font-mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted-2);margin-bottom:6px}
  .star .v{font-family:var(--font-display);font-weight:800;font-size:24px;letter-spacing:-.02em}
  .star .v.orange{color:var(--orange)}
  .star .sub{font-size:12.5px;color:var(--muted);margin-top:2px}

  /* sections */
  section{padding:56px 0 8px}
  .sec-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:22px}
  h2{font-family:var(--font-display);font-weight:700;font-size:22px;letter-spacing:-.02em}
  .sec-head .note{font-family:var(--font-mono);font-size:11.5px;color:var(--muted-2);letter-spacing:.04em}

  /* session cards */
  .cards{display:flex;flex-direction:column;gap:14px}
  .card{display:flex;align-items:center;gap:20px;border:1px solid var(--line);border-radius:14px;padding:22px 24px;background:#fff;transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease}
  .card:hover{transform:translateY(-2px);border-color:var(--orange);box-shadow:0 18px 40px -30px rgba(255,74,28,.45)}
  .card .date{font-family:var(--font-mono);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted-2);min-width:92px}
  .card .body{flex:1}
  .card .title{font-family:var(--font-display);font-weight:700;font-size:17px;letter-spacing:-.01em}
  .card .summary{font-size:14px;color:var(--muted);margin-top:3px}
  .card .arrow{color:var(--orange);font-family:var(--font-display);font-weight:800;font-size:18px;transition:transform .16s ease}
  .card:hover .arrow{transform:translateX(4px)}
  .card.next{border-style:dashed;background:var(--paper-2)}
  .card.next:hover{border-color:var(--orange)}
  .card.next .title{color:var(--muted)}

  /* tool grid */
  .tools{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:18px}
  .tool{border:1px solid var(--line);border-radius:18px;padding:28px;min-height:170px;background:#fff;transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease;display:flex;flex-direction:column;justify-content:space-between;gap:18px}
  .tool:hover{transform:translateY(-3px);border-color:var(--orange);box-shadow:0 22px 44px -30px rgba(255,74,28,.45)}
  .tool .icon{width:46px;height:46px;border-radius:12px;background:var(--orange-wash);color:var(--orange-ink);display:flex;align-items:center;justify-content:center}
  .tool .icon svg{width:24px;height:24px}
  .tool .title{font-family:var(--font-display);font-weight:700;font-size:20px;letter-spacing:-.015em}

  /* hub tiles */
  .hub{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:18px;padding-top:8px}
  .hub-tile{display:flex;flex-direction:column;justify-content:space-between;min-height:190px;border:none;border-radius:20px;padding:30px 30px 26px;color:#fff;transition:transform .18s ease,box-shadow .18s ease,filter .18s ease}
  .hub-tile:hover{transform:translateY(-3px);filter:brightness(1.06)}
  .hub-tile .hub-title{font-family:var(--font-display);font-weight:800;font-size:27px;letter-spacing:-.02em}
  .hub-tile .arrow{align-self:flex-end;font-family:var(--font-display);font-weight:800;font-size:24px;color:rgba(255,255,255,.9);transition:transform .16s ease}
  .hub-tile:hover .arrow{transform:translateX(5px)}
  .hub-tile.t-sessions{background:linear-gradient(135deg,#FF4A1C 0%,#E23B0F 100%);box-shadow:0 22px 44px -26px rgba(255,74,28,.55)}
  .hub-tile.t-tools{background:linear-gradient(135deg,#1E2027 0%,#0F0F10 100%);box-shadow:0 22px 44px -26px rgba(15,15,16,.55)}
  .hub-tile.t-assets{background:linear-gradient(135deg,#27384E 0%,#1B2838 100%);box-shadow:0 22px 44px -26px rgba(30,42,58,.55)}

  /* view routing */
  .view{display:none}
  .back{display:inline-block;font-family:var(--font-mono);font-size:12px;letter-spacing:.06em;color:var(--muted);margin-bottom:18px}
  .back:hover{color:var(--orange)}
  body.at-section #view-home{display:none}
  body.at-section .hero .star{display:none}

  footer{margin-top:72px;background:var(--ink-2);color:#fff;padding:40px 0}
  .foot-in{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px}
  footer .brand{color:#fff}
  footer .tag{font-size:13px;color:rgba(255,255,255,.5);font-family:var(--font-mono);letter-spacing:.02em}
  footer a.mail{color:var(--orange)}

  @media (max-width:640px){
    .star{flex-direction:column}
    .star .cell{border-right:0;border-bottom:1px solid var(--line)}
    .star .cell:last-child{border-bottom:0}
    .card{flex-wrap:wrap;gap:8px}
    .card .date{min-width:100%}
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="wrap nav-in">
    <span class="brand-pair">
      <a href="./" class="brand"><span class="dot"></span>HYPESONIC</a>
      <span class="x">&times;</span>
      <img class="lushin" src="assets/lushin-logo-color.png" alt="Lushin">
    </span>
    <span class="nav-links">
      <a href="#">Home</a>
      <a href="#sessions">Sessions</a>
      <a href="#tools">Tools</a>
      <a href="#assets">Assets</a>
    </span>
  </div>
</nav>

<main>
  <header class="wrap hero">
    <span class="eyebrow">Sales Playbook</span>
    <h1>Ananya Sales Playbook</h1>

    <div class="star">
      <div class="cell">
        <div class="k">The goal</div>
        <div class="v orange">$1M ARR</div>
        <div class="sub">$84K MRR</div>
      </div>
      <div class="cell">
        <div class="k">Starting from</div>
        <div class="v">~$250K ARR</div>
        <div class="sub">built in 6 months</div>
      </div>
      <div class="cell">
        <div class="k">The pace</div>
        <div class="v">+$21K MRR</div>
        <div class="sub">new, every month</div>
      </div>
    </div>
  </header>

  <!-- HOME: three sections she clicks into -->
  <section class="wrap" id="view-home">
    <div class="hub">
      <a class="hub-tile t-sessions" href="#sessions">
        <span class="hub-title">Sessions</span>
        <span class="arrow">&rarr;</span>
      </a>
      <a class="hub-tile t-tools" href="#tools">
        <span class="hub-title">Tools</span>
        <span class="arrow">&rarr;</span>
      </a>
      <a class="hub-tile t-assets" href="#assets">
        <span class="hub-title">Assets</span>
        <span class="arrow">&rarr;</span>
      </a>
    </div>
  </section>

  <!-- SECTION VIEWS -->
  <section class="wrap view" id="view-sessions">
    <a class="back" href="#">&larr; Playbook</a>
    <div class="sec-head"><h2>Sessions</h2></div>
    <div class="cards" id="sessionCards"></div>
  </section>

  <section class="wrap view" id="view-tools">
    <a class="back" href="#">&larr; Playbook</a>
    <div class="sec-head"><h2>Tools</h2></div>
    <div class="tools" id="toolCards"></div>
  </section>

  <section class="wrap view" id="view-assets">
    <a class="back" href="#">&larr; Playbook</a>
    <div class="sec-head"><h2>Assets</h2></div>
    <div class="tools" id="assetCards"></div>
  </section>
</main>

<footer>
  <div class="wrap foot-in">
    <span class="brand-pair">
      <a href="./" class="brand"><span class="dot"></span>HYPESONIC</a>
      <span class="x x-dark">&times;</span>
      <img class="lushin" src="assets/lushin-logo-white.png" alt="Lushin">
    </span>
  </div>
</footer>

<script>
/* ============================================================
   TO ADD A NEW SESSION:
   1. Make a new folder inside sessions/ with an index.html
      (and any files it links to) inside it.
   2. Add ONE line to the top of the SESSIONS list below (title + href).
   That's it — the page renders the rest.
   ============================================================ */
var SESSIONS = [
  { title: 'The Plan — Growing Sales to $84K MRR',
    href: 'sessions/2026-07-13/' }
];

var ASSETS = [
  { icon: 'compare', title: 'AI Ad Platform Comparison',
    href: 'tools/comparison.html' }
];

var TOOLS = [
  { icon: 'sheet', title: 'Behavior Cookbook',
    href: 'sessions/2026-07-13/Ananya_Cookbook.xlsx' },
  { icon: 'list', title: 'ZoomInfo Prospect List',
    href: 'sessions/2026-07-13/Ananya_ZoomInfo_List_July2026.xlsx' }
];

var ICONS = {
  sheet: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M3 9h18M3 14h18M9 9v11M15 9v11"/></svg>',
  list: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3.2"/><path d="M4 19c.6-3 2.6-4.6 5-4.6s4.4 1.6 5 4.6"/><path d="M16.5 8.5h4M16.5 12.5h4M16.5 16.5h4"/></svg>',
  compare: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v18"/><rect x="3" y="7" width="6" height="10" rx="1.5"/><rect x="15" y="5" width="6" height="14" rx="1.5"/></svg>'
};

(function(){
  var wrap = document.getElementById('sessionCards');
  var html = '';
  SESSIONS.forEach(function(s){
    html += '<a class="card" href="'+s.href+'">'
          + '<span class="body"><span class="title">'+s.title+'</span></span>'
          + '<span class="arrow">&rarr;</span></a>';
  });
  html += '<a class="card next" href="https://meetings.hubspot.com/dan210/30-mins" target="_blank" rel="noopener">'
        + '<span class="body"><span class="title">Book the next session</span></span>'
        + '<span class="arrow">&rarr;</span></a>';
  wrap.innerHTML = html;

  function renderTiles(id, items){
    var out = '';
    items.forEach(function(t){
      out += '<a class="tool" href="'+t.href+'">'
           + '<span class="icon">'+ICONS[t.icon]+'</span>'
           + '<span class="title">'+t.title+'</span></a>';
    });
    document.getElementById(id).innerHTML = out;
  }
  renderTiles('toolCards', TOOLS);
  renderTiles('assetCards', ASSETS);

  // hash router: #sessions / #tools / #assets show that section; anything else = home
  var views = ['sessions','tools','assets'];
  function route(){
    var h = (location.hash || '').replace('#','');
    var active = views.indexOf(h) > -1 ? h : null;
    views.forEach(function(v){
      document.getElementById('view-'+v).style.display = (v === active) ? 'block' : 'none';
    });
    document.body.classList.toggle('at-section', !!active);
    window.scrollTo(0,0);
  }
  window.addEventListener('hashchange', route);
  route();
})();
</script>
</body>
</html>
